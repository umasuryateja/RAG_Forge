services:
  # 1. Backend FastAPI Web Service
  - type: web
    name: ragforge-backend
    runtime: docker
    plan: free # Explicitly using Free Tier (Note: databases/uploads will be ephemeral)
    rootDir: backend
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set in the Render Dashboard
      - key: PROJECT_NAME
        value: "Enterprise AI Knowledge Assistant"
      - key: DATABASE_URL
        value: "sqlite:////app/sql_app.db" # Ephemeral SQLite path inside container
      - key: BACKEND_CORS_ORIGINS
        value: "https://ragforge-frontend.onrender.com,http://localhost:5173"
      - key: CHROMA_DB_PATH
        value: "/app/chroma_db" # Ephemeral vector database path
      - key: CHROMA_COLLECTION_NAME
        value: "documents"
      - key: UPLOAD_DIR
        value: "/app/uploads" # Ephemeral physical PDF storage path
      - key: CHUNK_SIZE
        value: "800"
      - key: CHUNK_OVERLAP
        value: "150"
      - key: LOG_LEVEL
        value: "INFO"
      - key: LOG_FILE
        value: "/app/logs/app.log" # Ephemeral log path

  # 2. Frontend React static site
  - type: web
    name: ragforge-frontend
    runtime: static
    plan: free # Static sites are always free on Render
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "dist"
    headers:
      - path: /*
        name: Cache-Control
        value: max-age=31536000
    envVars:
      - key: VITE_API_URL
        value: "https://ragforge-backend.onrender.com" # Replace with actual deployed backend URL if different
