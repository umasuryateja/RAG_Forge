services:
  # 1. Backend FastAPI Web Service
  - type: web
    name: ragforge-backend
    env: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: starter # Starter plan recommended for ChromaDB memory requirements
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set in the Render Dashboard
      - key: PROJECT_NAME
        value: "Enterprise AI Knowledge Assistant"
      - key: DATABASE_URL
        value: "sqlite:////app/data/sql_app.db" # Persistent SQLite DB path
      - key: BACKEND_CORS_ORIGINS
        value: "https://ragforge-frontend.onrender.com,http://localhost:5173"
      - key: CHROMA_DB_PATH
        value: "/app/data/chroma_db" # Persistent vector database path
      - key: CHROMA_COLLECTION_NAME
        value: "documents"
      - key: UPLOAD_DIR
        value: "/app/data/uploads" # Persistent physical PDF storage path
      - key: CHUNK_SIZE
        value: "800"
      - key: CHUNK_OVERLAP
        value: "150"
      - key: LOG_LEVEL
        value: "INFO"
      - key: LOG_FILE
        value: "/app/data/logs/app.log" # Persistent log file path
    # Mount persistent disk so ChromaDB indexes, sqlite database, physical uploads, and logs survive restarts
    disk:
      name: ragforge-storage
      mountPath: /app/data
      sizeGB: 10

  # 2. Frontend React static site
  - type: web
    name: ragforge-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    publishPath: "dist"
    headers:
      - path: /*
        name: Cache-Control
        value: max-age=31536000
    envVars:
      - key: VITE_API_URL
        value: "https://ragforge-backend.onrender.com" # Replace with actual deployed backend URL if different
