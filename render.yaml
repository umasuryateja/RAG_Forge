services:
  # 1. Backend FastAPI Web Service (Native Python)
  - type: web
    name: ragforge-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set in the Render Dashboard
      - key: PROJECT_NAME
        value: "Enterprise AI Knowledge Assistant"
      - key: DATABASE_URL
        value: "sqlite:///./sql_app.db" # Ephemeral database file inside backend/ directory
      - key: BACKEND_CORS_ORIGINS
        value: "https://ragforge-frontend.onrender.com,http://localhost:5173"
      - key: CHROMA_DB_PATH
        value: "chroma_db" # Ephemeral vector database path relative to backend/
      - key: CHROMA_COLLECTION_NAME
        value: "documents"
      - key: UPLOAD_DIR
        value: "uploads" # Ephemeral uploads path relative to backend/
      - key: CHUNK_SIZE
        value: "800"
      - key: CHUNK_OVERLAP
        value: "150"
      - key: LOG_LEVEL
        value: "INFO"
      - key: LOG_FILE
        value: "logs/app.log" # Ephemeral log file path relative to backend/

  # 2. Frontend React static site
  - type: web
    name: ragforge-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "dist"
    headers:
      - path: /*
        name: Cache-Control
        value: max-age=31536000
    envVars:
      - key: VITE_API_URL
        value: "https://ragforge-backend.onrender.com" # Replace with actual deployed backend URL if different
